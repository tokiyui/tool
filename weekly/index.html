<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Time Latitude Comparison</title>
<style>
body {
    margin: 0;
    padding: 10px;
    font-family: sans-serif;
}

.container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

.panel {
    text-align: center;
}

.panel img {
    width: 100%;
    height: auto;
    border: 1px solid #ccc;
}

.title {
    font-weight: bold;
    margin-bottom: 5px;
}
</style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="title">AIFS</div>
        <img src="time_latitude_AIFS.png" alt="AIFS">
    </div>

    <div class="panel">
        <div class="title">AIGFS</div>
        <img src="time_latitude_AIGFS.png" alt="AIGFS">
    </div>

    <div class="panel">
        <div class="title">ECMWF</div>
        <img src="time_latitude_ECMWF.png" alt="ECMWF">
    </div>

    <div class="panel">
        <div class="title">GSM</div>
        <img src="time_latitude_GSM.png" alt="GSM">
    </div>

    <div class="panel">
        <div class="title">NCEP</div>
        <img src="time_latitude_NCEP.png" alt="NCEP">
    </div>
</div>

</body>
</html>
