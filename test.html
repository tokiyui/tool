<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Realtime ASCAT Winds</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

.info {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;

    background: rgba(255,255,255,0.92);

    padding: 10px;

    border-radius: 10px;

    font-family: sans-serif;
}

</style>
</head>
<body>

<div id="map"></div>

<div class="info">
    <b>ASCAT Real-time Winds</b><br>
    NOAA / OSPO<br>
    <span id="time"></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =====================================================
// MAP
// =====================================================

const map = L.map('map', {
    worldCopyJump: true
}).setView([20, 140], 4);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

// =====================================================
// ASCAT IMAGE
// =====================================================

// NOAA OSPO ASCAT image
//
// 実際のリアルタイム画像
//
// 25km ascending pass
//

const imageUrl =
'https://www.ospo.noaa.gov/data/messages/ascat/ascatb_25km_latest_winds.png';

// 全球画像の範囲
const bounds = [
    [-90, -180],
    [90, 180]
];

const overlay = L.imageOverlay(
    imageUrl,
    bounds,
    {
        opacity: 0.75
    }
).addTo(map);

// =====================================================
// TIME
// =====================================================

function updateTime() {

    const now = new Date();

    document.getElementById('time').textContent =
        'Updated: ' + now.toLocaleString();
}

updateTime();

// =====================================================
// AUTO RELOAD
// =====================================================

setInterval(() => {

    // キャッシュ回避
    const newUrl =
        imageUrl + '?t=' + Date.now();

    overlay.setUrl(newUrl);

    updateTime();

}, 300000);

</script>

</body>
</html>
