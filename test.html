<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>衛星観測 海上風・波高（h5wasm / NetCDF4対応）</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}
#map{
  width:100%;
  height:100%;
}
.panel{
  position:absolute;
  z-index:1000;
  top:10px;
  left:10px;
  width:440px;
  max-height:94%;
  overflow:auto;
  background:rgba(10,16,28,.95);
  color:#fff;
  padding:14px;
  border-radius:12px;
}
button{
  padding:8px 12px;
  margin:4px 4px 8px 0;
  border:none;
  border-radius:8px;
  background:#2d8cff;
  color:#fff;
  cursor:pointer;
}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  background:#08101d;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  max-height:260px;
  overflow:auto;
}
.small{
  font-size:12px;
  color:#b8c5d9;
  line-height:1.45;
}
code{
  color:#7dd3fc;
}
</style>
</head>
<body>

<div class="panel">
<h2 style="margin-top:0;">衛星観測 海上風＋波高</h2>

<div class="small">
ブラウザのみ / GitHub Pages可 / APIキー不要<br>
NetCDF4(HDF5) を <code>h5wasm</code> で直接読む構成。<br><br>

<strong>重要:</strong><br>
実際にはここを最新NRTの.nc URLへ変更してください。<br>
（URLが正しければそのまま動きます）
</div>

<button onclick="loadWind()">海上風取得</button>
<button onclick="loadWave()">波高取得</button>
<button onclick="clearAll()">消去</button>

<pre id="log">待機中...</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import * as h5wasm from "https://cdn.jsdelivr.net/npm/h5wasm@0.8.7/dist/esm/index.js";

window.h5wasm = h5wasm;

/* ======================================================
   地図
====================================================== */

const map = L.map("map").setView([28,140],4);

L.tileLayer(
 "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
 { attribution:"© OpenStreetMap" }
).addTo(map);

const windLayer = L.layerGroup().addTo(map);
const waveLayer = L.layerGroup().addTo(map);

/* ======================================================
   共通
====================================================== */

function log(t){
 document.getElementById("log").textContent = t;
}
window.log = log;

window.clearAll = function(){
 windLayer.clearLayers();
 waveLayer.clearLayers();
 log("消去しました");
};

function findDataset(file,names){

 for(const n of names){
   try{
     const ds = file.get(n);
     if(ds) return ds;
   }catch(e){}
 }

 return null;
}

async function openRemoteNc(url){

 const res = await fetch(url);
 if(!res.ok) throw new Error("HTTP " + res.status);

 const buf = await res.arrayBuffer();

 const bytes = new Uint8Array(buf);

 const name = "/work.nc";

 h5wasm.FS.writeFile(name, bytes);

 return new h5wasm.File(name, "r");
}

/* ======================================================
   実際にはここを最新NRT URLへ変更
====================================================== */

const WIND_URL =
"https://example.com/latest_ascat.nc";

const WAVE_URL =
"https://example.com/latest_sentinel6.nc";

/* ======================================================
   海上風
====================================================== */

window.loadWind = async function(){

 windLayer.clearLayers();
 log("海上風取得中...");

 try{

   await h5wasm.ready;

   const file = await openRemoteNc(WIND_URL);

   const latDs = findDataset(file,[
     "lat","latitude","/lat","/latitude"
   ]);

   const lonDs = findDataset(file,[
     "lon","longitude","/lon","/longitude"
   ]);

   const spdDs = findDataset(file,[
     "wind_speed","windspeed","ws","/wind_speed"
   ]);

   if(!latDs || !lonDs || !spdDs){
     throw new Error("必要変数未検出");
   }

   const lat = latDs.value;
   const lon = lonDs.value;
   const spd = spdDs.value;

   let n = 0;

   for(let i=0;i<lat.length;i+=20){

     if(
       lat[i]==null ||
       lon[i]==null ||
       spd[i]==null
     ) continue;

     L.circleMarker([lat[i],lon[i]],{
       radius:3 + spd[i]/8,
       color:"#2ea8ff",
       fillColor:"#2ea8ff",
       fillOpacity:.8,
       weight:1
     })
     .bindPopup(
       "海上風<br>" +
       spd[i].toFixed(1)+" m/s"
     )
     .addTo(windLayer);

     n++;
   }

   file.close();

   log("海上風完了: " + n + " 点");

 }catch(e){

   log("海上風失敗\n" + e);
 }
};

/* ======================================================
   波高
====================================================== */

window.loadWave = async function(){

 waveLayer.clearLayers();
 log("波高取得中...");

 try{

   await h5wasm.ready;

   const file = await openRemoteNc(WAVE_URL);

   const latDs = findDataset(file,[
     "lat","latitude"
   ]);

   const lonDs = findDataset(file,[
     "lon","longitude"
   ]);

   const swhDs = findDataset(file,[
     "swh",
     "significant_wave_height",
     "wave_height"
   ]);

   if(!latDs || !lonDs || !swhDs){
     throw new Error("必要変数未検出");
   }

   const lat = latDs.value;
   const lon = lonDs.value;
   const swh = swhDs.value;

   let n = 0;

   for(let i=0;i<lat.length;i+=10){

     if(
       lat[i]==null ||
       lon[i]==null ||
       swh[i]==null
     ) continue;

     let c="#00bfff";
     if(swh[i]>2)c="#00ff88";
     if(swh[i]>4)c="#ffee00";
     if(swh[i]>6)c="#ff8800";
     if(swh[i]>8)c="#ff0000";

     L.circleMarker([lat[i],lon[i]],{
       radius:3 + swh[i],
       color:c,
       fillColor:c,
       fillOpacity:.85,
       weight:1
     })
     .bindPopup(
       "波高<br>" +
       swh[i].toFixed(1)+" m"
     )
     .addTo(waveLayer);

     n++;
   }

   file.close();

   log("波高完了: " + n + " 点");

 }catch(e){

   log("波高失敗\n" + e);
 }
};

</script>
</body>
</html>
