<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NASA CMR 正式準拠版（400修正済）</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:#0b1220;
  color:#fff;
}
h1{margin-top:0}
.card{
  background:#172033;
  padding:16px;
  border-radius:12px;
  margin-bottom:18px;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#2d8cff;
  color:#fff;
  cursor:pointer;
  margin-right:8px;
}
button:disabled{opacity:.6}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  background:#0d1526;
  padding:12px;
  border-radius:8px;
  max-height:560px;
  overflow:auto;
}
.small{
  color:#b7c3d8;
  font-size:13px;
}
</style>
</head>
<body>

<h1>NASA CMR API 正式準拠（Collection指定版）</h1>

<div class="card">
<h2>① 海上風（ASCAT）</h2>
<div class="small">
まず collections.json を検索し、collection_concept_id を取得してから granules 検索<br>
NASA CMR の正式要件に準拠
</div>
<button id="windBtn" onclick="loadWind()">取得</button>
<pre id="windOut">待機中...</pre>
</div>

<div class="card">
<h2>② 波高（Altimeter）</h2>
<div class="small">
Jason / Sentinel-6 等の波高コレクションを検索後 granules 検索
</div>
<button id="waveBtn" onclick="loadWave()">取得</button>
<pre id="waveOut">待機中...</pre>
</div>

<script>
"use strict";

/* ==========================================
   共通
========================================== */

function nowISO(){
  return new Date().toISOString().replace(/\.\d+Z$/,"Z");
}

function agoISO(h){
  return new Date(Date.now()-h*3600*1000)
         .toISOString()
         .replace(/\.\d+Z$/,"Z");
}

function qs(obj){
  return new URLSearchParams(obj).toString();
}

/* ==========================================
   1. Collection検索
========================================== */

async function findCollection(keyword){

  const url =
    "https://cmr.earthdata.nasa.gov/search/collections.json?" +
    qs({
      page_size:5,
      keyword:keyword
    });

  const res = await fetch(url,{
    headers:{Accept:"application/json"}
  });

  if(!res.ok){
    throw new Error("collections HTTP " + res.status);
  }

  const json = await res.json();

  const rows = json.feed?.entry || [];

  if(rows.length===0){
    throw new Error("collectionが見つかりません");
  }

  return rows[0];
}

/* ==========================================
   2. Granules検索
========================================== */

async function findGranules(collectionId){

  const url =
    "https://cmr.earthdata.nasa.gov/search/granules.json?" +
    qs({
      page_size:20,
      collection_concept_id:collectionId,
      temporal:agoISO(6)+","+nowISO()
    });

  const res = await fetch(url,{
    headers:{Accept:"application/json"}
  });

  if(!res.ok){

    const t = await res.text();
    throw new Error("granules HTTP " + res.status + "\n" + t);
  }

  const json = await res.json();

  return {
    url,
    rows: json.feed?.entry || []
  };
}

/* ==========================================
   リンク抽出
========================================== */

function getLink(links){

  if(!Array.isArray(links)) return "";

  for(const x of links){

    const h = x.href || "";

    if(/^https?:\/\//.test(h)){
      return h;
    }
  }

  return "";
}

/* ==========================================
   表示
========================================== */

function render(col,result){

  let txt = "";

  txt += "Collection:\n";
  txt += col.title + "\n";
  txt += col.id + "\n\n";

  txt += "Granule検索URL:\n";
  txt += result.url + "\n\n";

  txt += "件数: " + result.rows.length + "\n\n";

  if(result.rows.length===0){
    txt += "直近6時間のデータなし";
    return txt;
  }

  result.rows.forEach((r,i)=>{

    txt += "【"+(i+1)+"】\n";
    txt += "title : " + (r.title||"") + "\n";
    txt += "time  : " + (r.time_start||"") + "\n";
    txt += "link  : " + getLink(r.links) + "\n\n";

  });

  return txt;
}

/* ==========================================
   実行
========================================== */

async function run(btnId,outId,keyword){

  const btn = document.getElementById(btnId);
  const out = document.getElementById(outId);

  btn.disabled = true;
  out.textContent = "検索中...";

  try{

    const col = await findCollection(keyword);

    const result =
      await findGranules(col.id);

    out.textContent =
      render(col,result);

  }catch(e){

    out.textContent =
      "取得失敗\n\n" + e.message;
  }

  btn.disabled = false;
}

/* ==========================================
   個別
========================================== */

function loadWind(){

  run(
    "windBtn",
    "windOut",
    "ASCAT wind"
  );
}

function loadWave(){

  run(
    "waveBtn",
    "waveOut",
    "significant wave height Jason Sentinel"
  );
}

</script>
</body>
</html>
