<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ASCAT Real Data Viewer</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

.info {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;

    background: rgba(255,255,255,0.9);

    padding: 10px;

    border-radius: 10px;

    font-family: sans-serif;
}

</style>
</head>
<body>

<div id="map"></div>

<div class="info">
<b>ASCAT Real Winds</b><br>
<span id="status">Loading...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import netcdfjs from "https://cdn.jsdelivr.net/npm/netcdfjs/+esm";

// =====================================================
// MAP
// =====================================================

const map = L.map('map').setView([20,140], 4);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

// =====================================================
// CANVAS
// =====================================================

const canvas = document.createElement('canvas');

canvas.style.position = 'absolute';
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.pointerEvents = 'none';

map.getPanes().overlayPane.appendChild(canvas);

const ctx = canvas.getContext('2d');

function resizeCanvas() {

    const s = map.getSize();

    canvas.width = s.x;
    canvas.height = s.y;
}

resizeCanvas();

map.on('resize', resizeCanvas);

// =====================================================
// COLOR
// =====================================================

function color(speed) {

    if (speed < 5) return '#00ffff';
    if (speed < 10) return '#00ff00';
    if (speed < 15) return '#ffff00';
    if (speed < 20) return '#ff8800';

    return '#ff0000';
}

// =====================================================
// DRAW
// =====================================================

function drawWind(lat, lon, speed, dir) {

    const p =
        map.latLngToContainerPoint([lat, lon]);

    const rad = dir * Math.PI / 180;

    const u = -speed * Math.sin(rad);
    const v = -speed * Math.cos(rad);

    const scale = 2;

    const dx = u * scale;
    const dy = -v * scale;

    const c = color(speed);

    ctx.strokeStyle = c;
    ctx.fillStyle = c;

    ctx.lineWidth = 1;

    ctx.beginPath();

    ctx.moveTo(p.x, p.y);

    ctx.lineTo(
        p.x + dx,
        p.y + dy
    );

    ctx.stroke();

    const angle =
        Math.atan2(dy, dx);

    const a = 4;

    ctx.beginPath();

    ctx.moveTo(
        p.x + dx,
        p.y + dy
    );

    ctx.lineTo(
        p.x + dx - a * Math.cos(angle - Math.PI/6),
        p.y + dy - a * Math.sin(angle - Math.PI/6)
    );

    ctx.lineTo(
        p.x + dx - a * Math.cos(angle + Math.PI/6),
        p.y + dy - a * Math.sin(angle + Math.PI/6)
    );

    ctx.closePath();

    ctx.fill();
}

// =====================================================
// NOAA ASCAT DATA
// =====================================================

// IMPORTANT:
//
// .nc を直接取得
//
// NOAA実データ
//

const url =
'https://cwcgom.aoml.noaa.gov/thredds/fileServer/ASCAT/METOPB.nc';

// =====================================================
// FETCH
// =====================================================

async function loadASCAT() {

    document.getElementById('status')
        .textContent = 'Downloading NetCDF...';

    const response =
        await fetch(url);

    const arrayBuffer =
        await response.arrayBuffer();

    document.getElementById('status')
        .textContent = 'Parsing NetCDF...';

    const reader =
        new netcdfjs(arrayBuffer);

    // 変数名確認
    console.log(reader.variables);

    // NOAA ASCAT variables
    const lat =
        reader.getDataVariable('latitude');

    const lon =
        reader.getDataVariable('longitude');

    const wspd =
        reader.getDataVariable('wind_speed');

    const wdir =
        reader.getDataVariable('wind_dir');

    return {
        lat,
        lon,
        wspd,
        wdir
    };
}

// =====================================================
// RENDER
// =====================================================

async function render() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const data =
        await loadASCAT();

    const n = data.lat.length;

    // 点数多すぎるので間引く
    for (let i=0; i<n; i+=20) {

        const lat = data.lat[i];
        const lon = data.lon[i];

        let speed =
            data.wspd[i];

        let dir =
            data.wdir[i];

        // 欠損除去
        if (!isFinite(speed)) continue;
        if (!isFinite(dir)) continue;

        drawWind(
            lat,
            lon,
            speed,
            dir
        );
    }

    document.getElementById('status')
        .textContent =
            'ASCAT loaded';
}

render();

map.on('move zoom', render);

</script>

</body>
</html>
