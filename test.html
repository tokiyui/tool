<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>衛星観測 海上風・波高（NetCDF実読込版）</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}
#map{
  width:100%;
  height:100%;
}
.panel{
  position:absolute;
  z-index:1000;
  top:10px;
  left:10px;
  width:430px;
  max-height:94%;
  overflow:auto;
  background:rgba(10,16,28,.95);
  color:#fff;
  padding:14px;
  border-radius:12px;
}
button{
  padding:8px 12px;
  margin:4px 4px 8px 0;
  border:none;
  border-radius:8px;
  background:#2d8cff;
  color:#fff;
  cursor:pointer;
}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  background:#08101d;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  max-height:260px;
  overflow:auto;
}
.small{
  font-size:12px;
  color:#b8c5d9;
  line-height:1.45;
}
</style>
</head>
<body>

<div class="panel">
<h2 style="margin-top:0;">衛星観測 海上風＋波高</h2>

<div class="small">
APIキー不要 / HTML単体 / GitHub Pages可<br><br>

海上風（衛星散乱計）<br>
ASCAT MetOp-B NRT NetCDF<br><br>

波高（衛星高度計）<br>
Sentinel-6 / Jason 系 NRT NetCDF<br><br>

NetCDFをブラウザで直接読み込みます。
</div>

<button onclick="loadWind()">海上風取得</button>
<button onclick="loadWave()">波高取得</button>
<button onclick="clearAll()">消去</button>

<pre id="log">待機中...</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/netcdfjs@1.0.0/dist/netcdfjs.min.js"></script>

<script>
"use strict";

/* ===================================================
   地図
=================================================== */

const map = L.map("map").setView([28,140],4);

L.tileLayer(
 "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
 { attribution:"© OpenStreetMap" }
).addTo(map);

const windLayer = L.layerGroup().addTo(map);
const waveLayer = L.layerGroup().addTo(map);

/* ===================================================
   共通
=================================================== */

function log(t){
 document.getElementById("log").textContent=t;
}

function clearAll(){
 windLayer.clearLayers();
 waveLayer.clearLayers();
 log("消去しました");
}

async function loadNc(url){

 const res = await fetch(url);
 const buf = await res.arrayBuffer();
 return new netcdfjs(buf);
}

function readVar(nc,names){

 for(const n of names){
   try{
     return nc.getDataVariable(n);
   }catch(e){}
 }
 return null;
}

/* ===================================================
   海上風
   ASCAT MetOp-B
=================================================== */

async function loadWind(){

 windLayer.clearLayers();
 log("海上風 NetCDF取得中...");

 try{

   const url =
   "https://thredds.met.no/thredds/fileServer/" +
   "remotesensing/ascat/2026/05/01/" +
   "ascatb_20260501.nc";

   const nc = await loadNc(url);

   const lat = readVar(nc,["lat","latitude"]);
   const lon = readVar(nc,["lon","longitude"]);
   const wsp = readVar(nc,["wind_speed","windspeed","ws"]);

   if(!lat || !lon || !wsp){
     throw "変数未検出";
   }

   let n=0;

   for(let i=0;i<lat.length;i+=20){

     if(
       lat[i]==null ||
       lon[i]==null ||
       wsp[i]==null
     ) continue;

     L.circleMarker([lat[i],lon[i]],{
       radius:3 + wsp[i]/8,
       color:"#2ea8ff",
       fillColor:"#2ea8ff",
       fillOpacity:.8,
       weight:1
     })
     .bindPopup(
       "海上風<br>" +
       wsp[i].toFixed(1)+" m/s"
     )
     .addTo(windLayer);

     n++;
   }

   log("海上風完了: "+n+" 点");

 }catch(e){

   log("海上風失敗\n"+e);
 }
}

/* ===================================================
   波高
   Sentinel-6 / Jason
=================================================== */

async function loadWave(){

 waveLayer.clearLayers();
 log("波高 NetCDF取得中...");

 try{

   const url =
   "https://thredds.met.no/thredds/fileServer/" +
   "remotesensing/altimeter/2026/05/01/" +
   "sentinel6_20260501.nc";

   const nc = await loadNc(url);

   const lat = readVar(nc,["lat","latitude"]);
   const lon = readVar(nc,["lon","longitude"]);
   const swh = readVar(nc,[
     "swh",
     "significant_wave_height",
     "wave_height"
   ]);

   if(!lat || !lon || !swh){
     throw "変数未検出";
   }

   let n=0;

   for(let i=0;i<lat.length;i+=10){

     if(
       lat[i]==null ||
       lon[i]==null ||
       swh[i]==null
     ) continue;

     let c="#00bfff";
     if(swh[i]>2)c="#00ff88";
     if(swh[i]>4)c="#ffee00";
     if(swh[i]>6)c="#ff8800";
     if(swh[i]>8)c="#ff0000";

     L.circleMarker([lat[i],lon[i]],{
       radius:3 + swh[i],
       color:c,
       fillColor:c,
       fillOpacity:.8,
       weight:1
     })
     .bindPopup(
       "波高<br>" +
       swh[i].toFixed(1)+" m"
     )
     .addTo(waveLayer);

     n++;
   }

   log("波高完了: "+n+" 点");

 }catch(e){

   log("波高失敗\n"+e);
 }
}

</script>
</body>
</html>
