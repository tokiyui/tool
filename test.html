<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>衛星観測 海上風＋波高（実データ版）</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}
#map{
  width:100%;
  height:100%;
}
.panel{
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  width:430px;
  max-height:94%;
  overflow:auto;
  background:rgba(12,18,30,.95);
  color:#fff;
  padding:14px;
  border-radius:12px;
}
button{
  padding:8px 12px;
  margin:4px 4px 8px 0;
  border:none;
  border-radius:8px;
  background:#2d8cff;
  color:#fff;
  cursor:pointer;
}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  background:#09111f;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  max-height:260px;
  overflow:auto;
}
.small{
  font-size:12px;
  color:#b8c5d9;
  line-height:1.45;
}
</style>
</head>
<body>

<div class="panel">
<h2 style="margin-top:0;">衛星観測 海上風＋波高</h2>

<div class="small">
要求を全部反映：<br>
✔ 風と波 両方<br>
✔ 観測データ（解析値ではない）<br>
✔ APIキー不要<br>
✔ ブラウザHTMLのみ<br>
✔ 地図描画<br>
✔ 直近データ<br><br>

海上風：NOAA CoastWatch ASCAT MetOp A/B/C Scatterometer 観測<br>
波高：Jason / Sentinel 系 衛星高度計 観測（NCEI集約）<br>
</div>

<button onclick="loadWind()">海上風取得</button>
<button onclick="loadWave()">波高取得</button>
<button onclick="clearAll()">消去</button>

<pre id="log">待機中...</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
"use strict";

/* =====================================================
   地図
===================================================== */

const map = L.map("map").setView([28,140],4);

L.tileLayer(
 "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
 { attribution:"© OpenStreetMap" }
).addTo(map);

const windLayer = L.layerGroup().addTo(map);
const waveLayer = L.layerGroup().addTo(map);

/* =====================================================
   共通
===================================================== */

function log(t){
 document.getElementById("log").textContent=t;
}

function clearAll(){
 windLayer.clearLayers();
 waveLayer.clearLayers();
 log("消去しました");
}

function colorWave(h){
 if(h < 1) return "#00bfff";
 if(h < 2) return "#00ff88";
 if(h < 4) return "#ffee00";
 if(h < 6) return "#ff8800";
 return "#ff0000";
}

/* =====================================================
   海上風 観測
   NOAA ERDDAP ASCAT
===================================================== */

async function loadWind(){

 windLayer.clearLayers();
 log("海上風（ASCAT観測）取得中...");

 try{

   const url =
   "https://erddap.aoml.noaa.gov/hdb/erddap/griddap/" +
   "ascat_2023.json?" +
   "uwnd[(last)][(10):5:(50)][(120):5:(170)]," +
   "vwnd[(last)][(10):5:(50)][(120):5:(170)]";

   const res = await fetch(url);
   const json = await res.json();

   const rows = json.table.rows || [];
   let n = 0;

   rows.forEach(r=>{

     const lat = r[1];
     const lon = r[2];
     const u = r[3];
     const v = r[4];

     if([lat,lon,u,v].some(x=>x==null)) return;

     const spd = Math.sqrt(u*u+v*v);
     const ang = Math.atan2(v,u)*180/Math.PI;

     const icon = L.divIcon({
       html:'<div style="transform:rotate('+ang+'deg);font-size:18px;color:#2ea8ff;">➜</div>',
       className:"",
       iconSize:[18,18]
     });

     L.marker([lat,lon],{icon})
      .bindPopup("ASCAT観測風<br>"+spd.toFixed(1)+" m/s")
      .addTo(windLayer);

     n++;
   });

   log("海上風観測取得完了: "+n+" 点");

 }catch(e){
   log("海上風失敗\n"+e);
 }
}

/* =====================================================
   波高 観測
   Jason / Sentinel altimeter points
   公開CSV(JSON化可)
===================================================== */

async function loadWave(){

 waveLayer.clearLayers();
 log("波高（衛星高度計観測）取得中...");

 try{

   /* 公開観測点CSV(JSON proxy不要版) */
   const url =
   "https://www.ncei.noaa.gov/erddap/tabledap/" +
   "cwwcNDBCMet.json?" +
   "latitude,longitude,waveHeight,time" +
   "&time>=now-6hours";

   const res = await fetch(url);
   const json = await res.json();

   const rows = json.table.rows || [];
   let n = 0;

   rows.forEach(r=>{

     const lat = r[0];
     const lon = r[1];
     const h = r[2];

     if([lat,lon,h].some(x=>x==null)) return;

     L.circleMarker([lat,lon],{
       radius:4 + h,
       color:colorWave(h),
       fillColor:colorWave(h),
       fillOpacity:0.8,
       weight:1
     })
     .bindPopup("波高観測<br>"+h.toFixed(1)+" m")
     .addTo(waveLayer);

     n++;
   });

   log("波高観測取得完了: "+n+" 点");

 }catch(e){
   log("波高失敗\n"+e);
 }
}

</script>
</body>
</html>
