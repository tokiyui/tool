<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>衛星NRT 海上風・波高マップ</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}
#map{
  width:100%;
  height:100%;
}
.panel{
  position:absolute;
  z-index:1000;
  top:10px;
  left:10px;
  width:360px;
  max-height:92%;
  overflow:auto;
  background:rgba(15,22,38,.95);
  color:#fff;
  padding:14px;
  border-radius:12px;
}
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#2d8cff;
  color:#fff;
  cursor:pointer;
  margin:4px 4px 8px 0;
}
.small{
  font-size:12px;
  color:#b7c3d8;
  line-height:1.45;
}
pre{
  white-space:pre-wrap;
  font-size:12px;
  background:#0d1526;
  padding:10px;
  border-radius:8px;
  max-height:220px;
  overflow:auto;
}
.legend{
  margin-top:8px;
  font-size:12px;
}
</style>
</head>
<body>

<div class="panel">
<h2 style="margin-top:0;">衛星NRT 海上風・波高</h2>

<div class="small">
直近6時間の NASA CMR API から複数衛星を検索し、取得位置を地図描画。<br>
海上風：ASCAT / OSCAT / Scatterometer 系<br>
波高：Jason / Sentinel-6 / Altimeter 系
</div>

<div style="margin-top:10px;">
<button onclick="loadWind()">海上風取得</button>
<button onclick="loadWave()">波高取得</button>
<button onclick="clearMap()">消去</button>
</div>

<pre id="log">待機中...</pre>

<div class="legend">
● 青 = 海上風衛星<br>
● 赤 = 波高衛星
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
"use strict";

/* =====================================================
   地図
===================================================== */

const map = L.map("map").setView([25,140],4);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    maxZoom:19,
    attribution:"© OpenStreetMap"
  }
).addTo(map);

const layerWind = L.layerGroup().addTo(map);
const layerWave = L.layerGroup().addTo(map);

/* =====================================================
   共通
===================================================== */

function log(txt){
  document.getElementById("log").textContent = txt;
}

function nowISO(){
  return new Date().toISOString().replace(/\.\d+Z$/,"Z");
}

function agoISO(h){
  return new Date(Date.now()-h*3600*1000)
         .toISOString()
         .replace(/\.\d+Z$/,"Z");
}

function qs(obj){
  return new URLSearchParams(obj).toString();
}

function clearMap(){
  layerWind.clearLayers();
  layerWave.clearLayers();
  log("消去しました");
}

/* =====================================================
   Collection検索
===================================================== */

async function searchCollection(keyword){

  const url =
   "https://cmr.earthdata.nasa.gov/search/collections.json?" +
   qs({
     page_size:10,
     keyword:keyword
   });

  const res = await fetch(url,{
    headers:{Accept:"application/json"}
  });

  const json = await res.json();

  return json.feed?.entry || [];
}

/* =====================================================
   Granule検索
===================================================== */

async function searchGranules(collectionId){

  const url =
   "https://cmr.earthdata.nasa.gov/search/granules.json?" +
   qs({
     page_size:20,
     collection_concept_id:collectionId,
     temporal:agoISO(6)+","+nowISO()
   });

  const res = await fetch(url,{
    headers:{Accept:"application/json"}
  });

  const json = await res.json();

  return json.feed?.entry || [];
}

/* =====================================================
   座標抽出
===================================================== */

function parsePoint(granule){

  /* polygons 優先 */
  if(granule.polygons && granule.polygons.length){

    const p = granule.polygons[0][0].trim().split(/\s+/).map(Number);

    if(p.length >= 2){
      return [p[1], p[0]];
    }
  }

  /* boxes */
  if(granule.boxes && granule.boxes.length){

    const b = granule.boxes[0].split(/\s+/).map(Number);

    if(b.length === 4){

      const lat = (b[0]+b[2])/2;
      const lon = (b[1]+b[3])/2;

      return [lat,lon];
    }
  }

  return null;
}

/* =====================================================
   描画
===================================================== */

function drawEntries(entries,color,layer,label){

  let n = 0;

  entries.forEach(g=>{

    const pt = parsePoint(g);

    if(!pt) return;

    L.circleMarker(pt,{
      radius:5,
      color:color,
      fillColor:color,
      fillOpacity:0.8,
      weight:1
    })
    .bindPopup(
      "<b>"+label+"</b><br>" +
      (g.title||"") + "<br>" +
      (g.time_start||"")
    )
    .addTo(layer);

    n++;
  });

  return n;
}

/* =====================================================
   海上風
===================================================== */

async function loadWind(){

  log("海上風検索中...");

  layerWind.clearLayers();

  try{

    const cols = await searchCollection(
      "ASCAT OSCAT scatterometer wind ocean"
    );

    let total = 0;

    for(const c of cols.slice(0,5)){

      const gs = await searchGranules(c.id);

      total += drawEntries(
        gs,
        "#33aaff",
        layerWind,
        "海上風"
      );
    }

    log("海上風描画完了: " + total + " 点");

  }catch(e){

    log("失敗\n" + e);
  }
}

/* =====================================================
   波高
===================================================== */

async function loadWave(){

  log("波高検索中...");

  layerWave.clearLayers();

  try{

    const cols = await searchCollection(
      "Jason Sentinel-6 altimeter significant wave height"
    );

    let total = 0;

    for(const c of cols.slice(0,5)){

      const gs = await searchGranules(c.id);

      total += drawEntries(
        gs,
        "#ff5555",
        layerWave,
        "波高"
      );
    }

    log("波高描画完了: " + total + " 点");

  }catch(e){

    log("失敗\n" + e);
  }
}

</script>
</body>
</html>
