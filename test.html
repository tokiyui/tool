<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCAT Real-time Swath Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #control-panel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 15px;
            border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            max-width: 300px;
        }
        .status-msg { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .file-name { font-size: 10px; color: #555; word-break: break-all; }
        .legend { background: white; padding: 10px; line-height: 18px; border-radius: 5px; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="control-panel">
    <div id="status" class="status-msg" style="color: #d32f2f;">最新データ探索中...</div>
    <div id="file-display" class="file-name"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const PROXY = "https://worker.ryohorita105.workers.dev/?url=";
    const map = L.map('map').setView([35, 138], 5);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© KNMI OSI SAF / OpenStreetMap'
    }).addTo(map);

    function getColor(v) {
        return v > 20 ? '#7a0177' : v > 15 ? '#ae017e' : v > 10 ? '#f768a1' : 
               v > 5 ? '#fbb4b9' : v > 2 ? '#feebe2' : '#f7fcfd';
    }

    // OPeNDAP ASCIIのデータをクリーニングして配列化する
    function parseDodsAscii(text, varName) {
        // 変数セクションの開始位置を特定
        const startIdx = text.indexOf(`${varName}.${varName}[`);
        if (startIdx === -1) return [];
        
        // 次の変数セクションまたは末尾までのテキストを切り出す
        const subText = text.substring(startIdx).split(/\n[a-zA-Z]/)[0];
        
        // [数字] のようなインデックス表記をすべて削除し、カンマと改行で分割
        const cleanData = subText.replace(/\[\d+\]/g, '')
                                 .split(/[\n,]/)
                                 .map(s => s.trim())
                                 .filter(s => s !== "" && !isNaN(s) && !s.includes('['));
        
        return cleanData.map(Number);
    }

    async function fetchData() {
        const statusEl = document.getElementById('status');
        const fileEl = document.getElementById('file-display');

        try {
            const now = new Date();
            let y = now.getUTCFullYear();
            let m = String(now.getUTCMonth() + 1).padStart(2, '0');

            // 1. 最新カタログの取得
            let catUrl = `https://thredds.knmi.nl/thredds/catalog/osisaf/metop_b/ascat_coastal/${y}/${m}/catalog.xml`;
            let response = await fetch(PROXY + encodeURIComponent(catUrl));
            
            if (!response.ok) { // 先月にフォールバック
                now.setUTCMonth(now.getUTCMonth() - 1);
                y = now.getUTCFullYear(); m = String(now.getUTCMonth() + 1).padStart(2, '0');
                catUrl = `https://thredds.knmi.nl/thredds/catalog/osisaf/metop_b/ascat_coastal/${y}/${m}/catalog.xml`;
                response = await fetch(PROXY + encodeURIComponent(catUrl));
            }

            const xmlText = await response.text();
            const files = xmlText.match(/ascat_\d+_\d+_metopb_\d+_coastal\.nc/g);
            if (!files) throw new Error("利用可能なNetCDFファイルが見つかりません");

            const latestFile = files[files.length - 1];
            fileEl.innerText = latestFile;
            statusEl.innerText = "データ解析中...";

            // 2. OPeNDAPクエリ (Stride 8で間引き、計算負荷と精度のバランスを最適化)
            const stride = 8;
            const baseUrl = `https://thredds.knmi.nl/thredds/dodsC/osisaf/metop_b/ascat_coastal/${y}/${m}/${latestFile}`;
            const query = `.ascii?lat[0:${stride}:3263][0:${stride}:1623],lon[0:${stride}:3263][0:${stride}:1623],wind_speed[0:1:0][0:${stride}:3263][0:${stride}:1623]`;
            
            const dataRes = await fetch(PROXY + encodeURIComponent(baseUrl + query));
            const dataText = await dataRes.text();

            // 3. 各変数のパース
            const lats = parseDodsAscii(dataText, 'lat');
            const lons = parseDodsAscii(dataText, 'lon');
            const winds = parseDodsAscii(dataText, 'wind_speed');

            statusEl.innerText = "マッピング中...";
            let count = 0;

            // 4. スワスデータのプロット
            for (let i = 0; i < winds.length; i++) {
                let lat = lats[i];
                let lon = lons[i];
                let speed = winds[i] * 0.01; // ASCATのscale_factor 0.01を適用

                if (lon > 180) lon -= 360; // 経度補正

                // 日本近海フィルタリング
                if (lat > 20 && lat < 50 && lon > 120 && lon < 160 && winds[i] !== -32767) {
                    L.circleMarker([lat, lon], {
                        radius: 3,
                        fillColor: getColor(speed),
                        color: "#000", weight: 0.1, fillOpacity: 0.8
                    }).bindPopup(`Wind Speed: ${speed.toFixed(2)} m/s`).addTo(map);
                    count++;
                }
            }

            status.style.color = "#2e7d32";
            statusEl.innerText = count > 0 ? `表示完了: ${count}地点` : "最新の軌道に日本近海が含まれません";

        } catch (err) {
            statusEl.innerText = "エラー: " + err.message;
            console.error(err);
        }
    }

    // 凡例の追加
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        const grades = [0, 2, 5, 10, 15, 20];
        div.innerHTML = '<b>Wind Speed (m/s)</b><br>';
        for (let i = 0; i < grades.length; i++) {
            div.innerHTML += `<i style="background:${getColor(grades[i] + 1)}"></i> ${grades[i]}${grades[i+1] ? '&ndash;'+grades[i+1] : '+'}<br>`;
        }
        return div;
    };
    legend.addTo(map);

    fetchData();
</script>
</body>
</html>
