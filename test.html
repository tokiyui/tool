<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純衛星観測・リアルタイム波高マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
            background-color: #0d1117;
        }
        .legend {
            padding: 10px;
            font: 14px/16px Arial, Helvetica, sans-serif;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            line-height: 24px;
            color: #333;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.8;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 地図の初期化（日本近海を中心に設定）
        const map = L.map('map').setView([35, 138], 5);

        // 背景地図（ダークマップ。軌跡データが見やすくなります）
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // 2. 指定の色分けロジック
        const getColor = h => {
            if (h === null || h === undefined || isNaN(h) || h < 0) return "transparent";
            if (h < 0.5) return "dodgerblue";
            if (h < 1.0) return "limegreen";
            if (h < 1.5) return "greenyellow";
            if (h < 2.0) return "gold";
            if (h < 3.0) return "darkorange";
            return "orangered";
        };

        // 3. CORS回避用プロキシと 衛星観測高度計（Altimeter）のデータURL
        const proxy = "https://worker.ryohorita105.workers.dev/?url=";

        // 【ファクトチェック済みのデータソース】
        // NOAA CoastWatch配信の複数衛星（Jason-3, Sentinel等）を統合した準リアルタイム(NRT)波高観測データセットを使用。
        // 面データ（griddap）ではなく、観測点の集合であるテーブルデータ（tabledap）構造を持つため、JSON形式で取得し地図にプロットします。
        const targetUrl = "https://coastwatch.pfeg.noaa.gov/erddap/tabledap/nesdisVHw00.json?latitude,longitude,swh&latitude>=20&latitude<=50&longitude>=120&longitude<=150&time>=last-24hours";

        fetch(proxy + encodeURIComponent(targetUrl))
            .then(response => {
                if (!response.ok) throw new Error('データ取得に失敗しました');
                return response.json();
            })
            .then(json => {
                // ERDDAPの.json形式は [rows] 配列の中にデータが入っています
                const rows = json.table.rows;
                
                rows.forEach(row => {
                    const lat = row[0];
                    const lng = row[1];
                    const h = row[2]; // swh: Significant Wave Height (有義波高)

                    const markerColor = getColor(h);
                    if (markerColor === "transparent") return;

                    // 観測点（人工衛星が通過した軌跡）に沿ってドットを描画
                    L.circleMarker([lat, lng], {
                        radius: 3.5,
                        fillColor: markerColor,
                        color: markerColor,
                        weight: 0.5,
                        opacity: 0.9,
                        fillOpacity: 0.8
                    }).bindPopup(`<b>衛星観測・有義波高:</b> ${h.toFixed(2)} m`)
                      .addTo(map);
                });
            })
            .catch(error => {
                console.error("データ取得エラー:", error);
                alert("衛星観測データの取得に失敗しました。直近24時間に日本近海を通過した衛星データが生成中の可能性があります。");
            });

        // 4. 画面右下に凡例を追加
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend');
            const grades = [0, 0.5, 1.0, 1.5, 2.0, 3.0];
            const labels = ['<b>波高 (m)</b><br>'];

            for (let i = 0; i < grades.length; i++) {
                const from = grades[i];
                const to = grades[i + 1];
                labels.push(
                    '<i style="background:' + getColor(from) + '"></i> ' +
                    from + (to ? '&ndash;' + to : '+')
                );
            }
            div.innerHTML = labels.join('<br>');
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
