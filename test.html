<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>海上風・波高（実在データ安定版）</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{width:100%;height:100%;}
.panel{
position:absolute;top:10px;left:10px;z-index:1000;
width:420px;max-height:92%;overflow:auto;
background:rgba(10,16,28,.95);color:#fff;
padding:12px;border-radius:10px;
}
button{
margin:4px;padding:8px;border:0;border-radius:6px;
background:#2d8cff;color:#fff;cursor:pointer;
}
pre{
font-size:12px;background:#08101d;padding:8px;
border-radius:6px;max-height:220px;overflow:auto;
white-space:pre-wrap;
}
</style>
</head>
<body>

<div class="panel">
<h3>海上風・波高（実データ）</h3>

<button onclick="loadWind()">海上風</button>
<button onclick="loadWave()">波高</button>
<button onclick="clearAll()">クリア</button>

<pre id="log">ready</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const CORS_PROXY="https://worker.ryohorita105.workers.dev/?url=";

const map=L.map("map").setView([25,140],4);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OSM"}).addTo(map);

const windLayer=L.layerGroup().addTo(map);
const waveLayer=L.layerGroup().addTo(map);

function log(t){document.getElementById("log").textContent=t;}

function clearAll(){
windLayer.clearLayers();
waveLayer.clearLayers();
log("cleared");
}

/* ===========================
   海上風（ASCATグリッド）
=========================== */
async function loadWind(){

windLayer.clearLayers();
log("loading wind...");

const url =
CORS_PROXY +
encodeURIComponent(
"https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdQMwind1day.json?" +
"latitude,longitude,windspeed"
);

try{

const j=await (await fetch(url)).json();

let n=0;

for(const r of j.table.rows){

const lat=r[0],lon=r[1],w=r[2];

if(lat==null||lon==null||w==null) continue;

L.circleMarker([lat,lon],{
radius:3+w/2,
color:"#2ea8ff",
fillColor:"#2ea8ff",
fillOpacity:0.8
}).addTo(windLayer);

n++;
}

log("wind points: "+n);

}catch(e){
log("wind error: "+e);
}
}

/* ===========================
   波高（WW3グローバル）
=========================== */
async function loadWave(){

waveLayer.clearLayers();
log("loading wave...");

const url =
CORS_PROXY +
encodeURIComponent(
"https://coastwatch.pfeg.noaa.gov/erddap/griddap/ww3_global.json?" +
"latitude,longitude,significant_wave_height"
);

try{

const j=await (await fetch(url)).json();

let n=0;

for(const r of j.table.rows){

const lat=r[0],lon=r[1],h=r[2];

if(lat==null||lon==null||h==null) continue;

let c="#00bfff";
if(h>2)c="#00ff88";
if(h>4)c="#ffee00";
if(h>6)c="#ff8800";
if(h>8)c="#ff0000";

L.circleMarker([lat,lon],{
radius:3+h,
color:c,
fillColor:c,
fillOpacity:0.85
}).addTo(waveLayer);

n++;
}

log("wave points: "+n);

}catch(e){
log("wave error: "+e);
}
}

</script>
</body>
</html>
