<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCAT (KNMI Thredds) Precise Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000c18; }
        #map { height: 100vh; width: 100%; }
        #ui {
            position: absolute; top: 15px; left: 60px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px; border-radius: 4px; z-index: 1000;
            border-left: 5px solid #0055ff; max-width: 280px;
        }
        .legend { line-height: 18px; background: white; padding: 8px; border-radius: 4px; font-size: 11px; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="ui">
        <h3 style="margin:0; font-size:15px;">ASCAT MetOp-B Coastal</h3>
        <div id="status" style="font-size:12px; margin-top:5px; color:#c00;">サーバー接続中...</div>
        <div id="file" style="font-size:9px; color:#666; margin-top:4px; overflow-wrap: break-word;"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const PROXY = "https://worker.ryohorita105.workers.dev/?url=";

        const map = L.map('map').setView([35.0, 138.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: 'KNMI OSI SAF'
        }).addTo(map);

        function getColor(v) {
            return v > 15 ? '#b2182b' : v > 10 ? '#ef8a62' : v > 7 ? '#fddbc7' : v > 4 ? '#d1e5f0' : v > 2 ? '#67a9cf' : '#2166ac';
        }

        // セクション名（lat, lon, wind_speed）に基づいてデータを抽出する堅牢なパース関数
        function extractVar(text, varName) {
            // 変数ヘッダーを探す (例: "lat.lat[3264][1624]")
            const regex = new RegExp(`${varName}\\.${varName}\\[\\d+\\]\\[\\d+\\]`, 'g');
            const parts = text.split(regex);
            if (parts.length < 2) return [];
            
            // 次の変数の開始か、フッターまでを対象にする
            const section = parts[1].split(/[a-zA-Z]+\.[a-zA-Z]+\[/)[0];
            return section.split(/[\s,]+/)
                .map(v => parseFloat(v))
                .filter(v => !isNaN(v));
        }

        async function init() {
            const status = document.getElementById('status');
            const fileEl = document.getElementById('file');

            try {
                let d = new Date();
                let y = d.getUTCFullYear();
                let m = String(d.getUTCMonth() + 1).padStart(2, '0');

                // カタログ取得
                let catUrl = `https://thredds.knmi.nl/thredds/catalog/osisaf/metop_b/ascat_coastal/${y}/${m}/catalog.xml`;
                let res = await fetch(PROXY + encodeURIComponent(catUrl));
                
                // 今月分がなければ先月分をトライ
                if (!res.ok) {
                    d.setUTCMonth(d.getUTCMonth() - 1);
                    y = d.getUTCFullYear(); m = String(d.getUTCMonth() + 1).padStart(2, '0');
                    catUrl = `https://thredds.knmi.nl/thredds/catalog/osisaf/metop_b/ascat_coastal/${y}/${m}/catalog.xml`;
                    res = await fetch(PROXY + encodeURIComponent(catUrl));
                }

                const catText = await res.text();
                const files = catText.match(/ascat_[0-9_]+_metopb_[0-9]+_coastal\.nc/g);
                if (!files) throw new Error("最新の観測データが公開されていません");

                const latestFile = files[files.length - 1];
                fileEl.innerText = latestFile;
                status.innerText = "データを抽出中...";

                // OPeNDAP ASCII 抽出 (Stride 10で間引き)
                const s = 10;
                const path = `https://thredds.knmi.nl/thredds/dodsC/osisaf/metop_b/ascat_coastal/${y}/${m}/${latestFile}`;
                const query = `.ascii?lat[0:${s}:3263][0:${s}:1623],lon[0:${s}:3263][0:${s}:1623],wind_speed[0:1:0][0:${s}:3263][0:${s}:1623]`;
                
                const dataRes = await fetch(PROXY + encodeURIComponent(path + query));
                const dataText = await dataRes.text();

                const lats = extractVar(dataText, 'lat');
                const lons = extractVar(dataText, 'lon');
                const speeds = extractVar(dataText, 'wind_speed');

                if (lats.length === 0 || speeds.length === 0) throw new Error("データの解析に失敗しました");

                status.innerText = "地図にプロット中...";
                let count = 0;

                for (let i = 0; i < speeds.length; i++) {
                    let lt = lats[i];
                    let ln = lons[i];
                    let sp = speeds[i] * 0.01; // 内部単位(cm/s)を(m/s)に変換(ファイルにより異なるためチェック済み)
                    
                    // スケール補正 (もし100倍されていなければそのまま使う)
                    if (sp < 0.1 && speeds[i] > 0) sp = speeds[i];

                    // 経度正規化
                    if (ln > 180) ln -= 360;

                    // 日本近海フィルター
                    if (lt > 20 && lt < 50 && ln > 120 && ln < 155 && sp < 60) {
                        L.circleMarker([lt, ln], {
                            radius: 3,
                            fillColor: getColor(sp),
                            color: "#000", weight: 0.1, fillOpacity: 0.8
                        }).bindPopup(`Wind: ${sp.toFixed(1)} m/s`).addTo(map);
                        count++;
                    }
                }

                status.style.color = "#008800";
                status.innerText = count > 0 ? `表示中: ${count} 地点` : "最新パスに日本近海は含まれません";

            } catch (err) {
                status.innerText = "エラー: " + err.message;
                console.error(err);
            }
        }

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            const g = [0, 2, 4, 7, 10, 15];
            div.innerHTML = '<b>Wind (m/s)</b><br>';
            g.forEach(v => {
                div.innerHTML += `<i style="background:${getColor(v+1)}"></i> ${v}${v===15?'+':'-'+(v+(v<7?2:3))}<br>`;
            });
            return div;
        };
        legend.addTo(map);

        init();
    </script>
</body>
</html>
