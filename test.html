<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NASA CMR準拠 衛星NRT検索（直近6時間）</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:#0b1220;
  color:#fff;
}
h1{margin-top:0}
.card{
  background:#172033;
  padding:16px;
  border-radius:12px;
  margin-bottom:18px;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#2d8cff;
  color:#fff;
  cursor:pointer;
  margin-right:8px;
}
button:disabled{opacity:.6}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  background:#0d1526;
  padding:12px;
  border-radius:8px;
  max-height:540px;
  overflow:auto;
  line-height:1.45;
}
.small{
  color:#b7c3d8;
  font-size:13px;
}
</style>
</head>
<body>

<h1>NASA CMR API準拠（直近6時間）</h1>

<div class="card">
<h2>① 海上風（ASCAT / Scatterometer）</h2>
<div class="small">
CMR Search API granules.json を公式仕様で使用<br>
temporal=開始,終了 / sort_key[]=-start_date
</div>
<br>
<button id="windBtn" onclick="loadWind()">取得</button>
<pre id="windOut">待機中...</pre>
</div>

<div class="card">
<h2>② 波高（Altimeter / Significant Wave Height）</h2>
<div class="small">
Jason / Sentinel-6 等の衛星高度計関連 granule を検索
</div>
<br>
<button id="waveBtn" onclick="loadWave()">取得</button>
<pre id="waveOut">待機中...</pre>
</div>

<script>
"use strict";

/* =====================================================
   NASA CMR Search API 公式仕様
   https://cmr.earthdata.nasa.gov/search/site/docs/search/api
===================================================== */

const BASE =
"https://cmr.earthdata.nasa.gov/search/granules.json";

const HOURS = 6;
const PAGE_SIZE = 20;

/* =====================================================
   時刻
===================================================== */

function nowISO(){
  return new Date().toISOString().replace(/\.\d+Z$/,"Z");
}

function agoISO(h){
  return new Date(Date.now()-h*3600*1000)
         .toISOString()
         .replace(/\.\d+Z$/,"Z");
}

/* =====================================================
   URL生成（公式準拠）
===================================================== */

function buildURL(keyword){

  const p = new URLSearchParams();

  p.set("page_size", PAGE_SIZE);

  // 配列パラメータ
  p.append("sort_key[]","-start_date");

  // 公式 temporal=開始,終了
  p.set(
    "temporal",
    agoISO(HOURS) + "," + nowISO()
  );

  // free text search
  p.set("keyword", keyword);

  return BASE + "?" + p.toString();
}

/* =====================================================
   検索
===================================================== */

async function search(keyword){

  const url = buildURL(keyword);

  const res = await fetch(url,{
    headers:{
      "Accept":"application/json"
    }
  });

  if(!res.ok){
    const txt = await res.text();
    throw new Error("HTTP " + res.status + "\n" + txt);
  }

  const json = await res.json();

  if(!json.feed || !Array.isArray(json.feed.entry)){
    throw new Error("レスポンス形式異常");
  }

  return {
    url,
    rows: json.feed.entry
  };
}

/* =====================================================
   リンク抽出
===================================================== */

function bestLink(links){

  if(!Array.isArray(links)) return "";

  // NetCDF優先
  for(const x of links){
    const h = x.href || "";
    if(/\.nc($|\?)/i.test(h)) return h;
  }

  // それ以外
  for(const x of links){
    const h = x.href || "";
    if(/^https?:\/\//i.test(h)) return h;
  }

  return "";
}

/* =====================================================
   表示
===================================================== */

function render(result){

  let txt = "";
  txt += "検索URL:\n" + result.url + "\n\n";
  txt += "件数: " + result.rows.length + "\n\n";

  if(result.rows.length===0){
    txt += "直近6時間の該当データなし";
    return txt;
  }

  result.rows.forEach((r,i)=>{

    txt += "【" + (i+1) + "】\n";
    txt += "title : " + (r.title || "") + "\n";
    txt += "time  : " + (r.time_start || "") + "\n";
    txt += "id    : " + (r.id || "") + "\n";

    const link = bestLink(r.links);

    txt += "link  : " + link + "\n\n";

  });

  return txt;
}

/* =====================================================
   共通実行
===================================================== */

async function run(btnId,outId,keyword){

  const btn = document.getElementById(btnId);
  const out = document.getElementById(outId);

  btn.disabled = true;
  out.textContent = "検索中...";

  try{

    const r = await search(keyword);
    out.textContent = render(r);

  }catch(e){

    out.textContent =
      "取得失敗\n\n" + e.message;

  }

  btn.disabled = false;
}

/* =====================================================
   個別
===================================================== */

function loadWind(){

  run(
    "windBtn",
    "windOut",
    "ASCAT scatterometer wind ocean"
  );
}

function loadWave(){

  run(
    "waveBtn",
    "waveOut",
    "significant wave height altimeter Jason Sentinel-6"
  );
}

</script>
</body>
</html>
