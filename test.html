<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ASCAT NetCDF Viewer</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

.panel {

    position: absolute;

    top: 10px;
    left: 10px;

    z-index: 9999;

    background: rgba(255,255,255,0.95);

    padding: 10px;

    border-radius: 10px;

    font-family: sans-serif;

    width: 320px;
}

#status {
    color: red;
    font-size: 13px;
}

</style>
</head>
<body>

<div id="map"></div>

<div class="panel">

<b>ASCAT NetCDF Viewer</b><br><br>

Data Source:<br>
NOAA THREDDS / ASCAT METOP-B<br><br>

<button onclick="loadASCAT()">
Load ASCAT
</button>

<hr>

<div id="status">
Ready
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import netcdfjs from
'https://cdn.jsdelivr.net/npm/netcdfjs/+esm';

// =====================================================
// MAP
// =====================================================

const map =
    L.map('map')
    .setView([20,140], 4);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

// =====================================================
// CANVAS
// =====================================================

const canvas =
    document.createElement('canvas');

canvas.style.position = 'absolute';
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.pointerEvents = 'none';

map.getPanes().overlayPane.appendChild(canvas);

const ctx =
    canvas.getContext('2d');

function resizeCanvas() {

    const size =
        map.getSize();

    canvas.width =
        size.x;

    canvas.height =
        size.y;
}

resizeCanvas();

map.on('resize', resizeCanvas);

// =====================================================
// COLORBAR
// =====================================================

function windColor(speed) {

    if (speed < 5)
        return '#0000ff';

    if (speed < 10)
        return '#00ffff';

    if (speed < 15)
        return '#00ff00';

    if (speed < 20)
        return '#ffff00';

    if (speed < 25)
        return '#ff8800';

    return '#ff0000';
}

// =====================================================
// DRAW
// =====================================================

function drawWind(lat, lon, u, v) {

    const p =
        map.latLngToContainerPoint([lat, lon]);

    const speed =
        Math.sqrt(u*u + v*v);

    const scale = 2.0;

    const dx = u * scale;
    const dy = -v * scale;

    const color =
        windColor(speed);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;

    ctx.lineWidth = 1;

    // main line

    ctx.beginPath();

    ctx.moveTo(p.x, p.y);

    ctx.lineTo(
        p.x + dx,
        p.y + dy
    );

    ctx.stroke();

    // arrow

    const angle =
        Math.atan2(dy, dx);

    const a = 4;

    ctx.beginPath();

    ctx.moveTo(
        p.x + dx,
        p.y + dy
    );

    ctx.lineTo(
        p.x + dx
            - a * Math.cos(angle - Math.PI/6),

        p.y + dy
            - a * Math.sin(angle - Math.PI/6)
    );

    ctx.lineTo(
        p.x + dx
            - a * Math.cos(angle + Math.PI/6),

        p.y + dy
            - a * Math.sin(angle + Math.PI/6)
    );

    ctx.closePath();

    ctx.fill();
}

// =====================================================
// ASCAT URL
// =====================================================

// 実データ
//
// NOAA THREDDS
//

const sourceUrl =
'https://cwcgom.aoml.noaa.gov/thredds/fileServer/ASCAT/METOPB.nc';

// worker 経由

const ncUrl =
'https://worker.ryohorita105.workers.dev/?url='
+
encodeURIComponent(sourceUrl);

// =====================================================
// LOAD NETCDF
// =====================================================

async function loadASCAT() {

    document.getElementById('status')
        .textContent =
            'Downloading NetCDF...';

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    try {

        // =============================================
        // FETCH
        // =============================================

        const response =
            await fetch(ncUrl);

        if (!response.ok) {

            throw new Error(
                'HTTP ' + response.status
            );
        }

        const arrayBuffer =
            await response.arrayBuffer();

        document.getElementById('status')
            .textContent =
                'Parsing NetCDF...';

        // =============================================
        // PARSE
        // =============================================

        const nc =
            new netcdfjs(arrayBuffer);

        console.log(nc);

        // =============================================
        // VARIABLE NAMES
        // =============================================

        // 実際の変数名確認用
        console.log(
            nc.variables.map(v => v.name)
        );

        // =============================================
        // VARIABLES
        // =============================================

        // NOAA ASCAT commonly uses:
        //
        // latitude
        // longitude
        // wind_speed
        // wind_dir
        //
        // datasetによって違う可能性あり
        //

        const lat =
            nc.getDataVariable('latitude');

        const lon =
            nc.getDataVariable('longitude');

        const speed =
            nc.getDataVariable('wind_speed');

        const dir =
            nc.getDataVariable('wind_dir');

        // =============================================
        // DRAW
        // =============================================

        let count = 0;

        for (let i=0; i<lat.length; i+=20) {

            const la = lat[i];
            const lo = lon[i];

            const sp = speed[i];
            const di = dir[i];

            if (!isFinite(sp)) continue;
            if (!isFinite(di)) continue;

            // meteorological direction

            const rad =
                di * Math.PI / 180;

            const u =
                -sp * Math.sin(rad);

            const v =
                -sp * Math.cos(rad);

            drawWind(
                la,
                lo,
                u,
                v
            );

            count++;
        }

        document.getElementById('status')
            .textContent =
                `Loaded ${count} vectors`;

    } catch(err) {

        console.error(err);

        document.getElementById('status')
            .textContent =
                err.toString();
    }
}

// =====================================================
// REDRAW
// =====================================================

map.on('move zoom', () => {

    loadASCAT();
});

</script>

</body>
</html>
