<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衛星・予測モデル リアルタイム波高マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
            background-color: #0d1117;
        }
        .legend {
            padding: 10px;
            font: 14px/16px Arial, Helvetica, sans-serif;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            line-height: 24px;
            color: #333;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.8;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 地図の初期化（日本近海を中心に設定）
        const map = L.map('map').setView([35, 138], 5);

        // 背景地図（ダークマップ）
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // 2. 指定の色分けロジック
        const getColor = h => {
            if (h === null || h === undefined || isNaN(h)) return "transparent";
            if (h < 0.5) return "dodgerblue";
            if (h < 1.0) return "limegreen";
            if (h < 1.5) return "greenyellow";
            if (h < 2.0) return "gold";
            if (h < 3.0) return "darkorange";
            return "orangered";
        };

        // 3. CORS回避用プロキシと 2026年最新WaveWatch III API URL
        const proxy = "https://worker.ryohorita105.workers.dev/?url=";
        
        // 【修正ポイント】
        // サーバーを最新のWaveWatch_2026に変更し、日本近海（緯度20~50, 経度120~150）に切り出し。
        // 変数名を「Thgt (波高)」に修正しています。
        const targetUrl = "https://erddap.aoml.noaa.gov/hdb/erddap/griddap/WaveWatch_2026.geoJson?Thgt[(last)][(20.0):1:(50.0)][(120.0):1:(150.0)]";

        fetch(proxy + encodeURIComponent(targetUrl))
            .then(response => {
                if (!response.ok) throw new Error('データサーバーまたはプロキシからの応答がありません');
                return response.json();
            })
            .then(data => {
                // GeoJSONデータを地図に展開
                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        // WaveWatch 2026のプロパティ名「Thgt」を取得
                        const h = feature.properties.Thgt;
                        
                        // 指定の色ロジックを適用
                        const markerColor = getColor(h);

                        if (markerColor === "transparent") return null;

                        return L.circleMarker(latlng, {
                            radius: 5,               // 見やすさのためサイズを少し調整
                            fillColor: markerColor,
                            color: markerColor,
                            weight: 0.5,
                            opacity: 0.8,
                            fillOpacity: 0.6
                        }).bindPopup(`<b>有義波高:</b> ${h.toFixed(2)} m`);
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.error("データ取得エラー:", error);
                alert("データの取得に失敗しました。時間をおいて再読み込みしてください。");
            });

        // 4. 画面右下に凡例を追加
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend');
            const grades = [0, 0.5, 1.0, 1.5, 2.0, 3.0];
            const labels = ['<b>波高 (m)</b><br>'];

            for (let i = 0; i < grades.length; i++) {
                const from = grades[i];
                const to = grades[i + 1];
                labels.push(
                    '<i style="background:' + getColor(from) + '"></i> ' +
                    from + (to ? '&ndash;' + to : '+')
                );
            }
            div.innerHTML = labels.join('<br>');
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
