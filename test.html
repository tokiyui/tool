<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>衛星NRT 海上風・波高マップ（名称見直し版）</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}
#map{
  width:100%;
  height:100%;
}
.panel{
  position:absolute;
  z-index:1000;
  top:10px;
  left:10px;
  width:390px;
  max-height:94%;
  overflow:auto;
  background:rgba(15,22,38,.96);
  color:#fff;
  padding:14px;
  border-radius:12px;
}
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#2d8cff;
  color:#fff;
  cursor:pointer;
  margin:4px 4px 8px 0;
}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  font-size:12px;
  background:#0d1526;
  padding:10px;
  border-radius:8px;
  max-height:260px;
  overflow:auto;
}
.small{
  font-size:12px;
  color:#b7c3d8;
  line-height:1.45;
}
</style>
</head>
<body>

<div class="panel">
<h2 style="margin-top:0;">衛星 海上風・波高（名称見直し版）</h2>

<div class="small">
NASA CMRは曖昧語句では拾えないため、実在しやすい正式名称へ修正。<br>
海上風：ASCAT / METOP / scatterometer<br>
波高：JASON-3 / SENTINEL-6 / POSEIDON-4 / altimeter
</div>

<button onclick="loadWind()">海上風取得</button>
<button onclick="loadWave()">波高取得</button>
<button onclick="clearAll()">消去</button>

<pre id="log">待機中...</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
"use strict";

/* =====================================================
   地図
===================================================== */

const map = L.map("map").setView([25,140],4);

L.tileLayer(
 "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
 {
   attribution:"© OpenStreetMap"
 }
).addTo(map);

const windLayer = L.layerGroup().addTo(map);
const waveLayer = L.layerGroup().addTo(map);

/* =====================================================
   共通
===================================================== */

function log(t){
  document.getElementById("log").textContent = t;
}

function nowISO(){
  return new Date().toISOString().replace(/\.\d+Z$/,"Z");
}

function agoISO(h){
  return new Date(Date.now()-h*3600*1000)
         .toISOString()
         .replace(/\.\d+Z$/,"Z");
}

function qs(obj){
  return new URLSearchParams(obj).toString();
}

function clearAll(){
  windLayer.clearLayers();
  waveLayer.clearLayers();
  log("消去しました");
}

/* =====================================================
   Collection検索
===================================================== */

async function collections(keyword){

  const url =
   "https://cmr.earthdata.nasa.gov/search/collections.json?" +
   qs({
     page_size:10,
     keyword:keyword
   });

  const res = await fetch(url,{
    headers:{Accept:"application/json"}
  });

  const json = await res.json();

  return json.feed?.entry || [];
}

/* =====================================================
   Granule検索
===================================================== */

async function granules(collectionId){

  const url =
   "https://cmr.earthdata.nasa.gov/search/granules.json?" +
   qs({
     page_size:20,
     collection_concept_id:collectionId,
     temporal:agoISO(6)+","+nowISO()
   });

  const res = await fetch(url,{
    headers:{Accept:"application/json"}
  });

  const json = await res.json();

  return json.feed?.entry || [];
}

/* =====================================================
   座標抽出
===================================================== */

function point(g){

  if(g.boxes && g.boxes.length){

    const b = g.boxes[0].split(/\s+/).map(Number);

    if(b.length===4){
      return [
        (b[0]+b[2])/2,
        (b[1]+b[3])/2
      ];
    }
  }

  if(g.polygons && g.polygons.length){

    const p = g.polygons[0][0].trim().split(/\s+/).map(Number);

    if(p.length>=2){
      return [p[1],p[0]];
    }
  }

  return null;
}

/* =====================================================
   描画
===================================================== */

function draw(rows,color,layer,label){

  let n = 0;

  rows.forEach(g=>{

    const pt = point(g);

    if(!pt) return;

    L.circleMarker(pt,{
      radius:5,
      color:color,
      fillColor:color,
      fillOpacity:0.85,
      weight:1
    })
    .bindPopup(
      "<b>"+label+"</b><br>" +
      (g.title||"") + "<br>" +
      (g.time_start||"")
    )
    .addTo(layer);

    n++;
  });

  return n;
}

/* =====================================================
   海上風
===================================================== */

async function loadWind(){

  log("海上風検索中...");
  windLayer.clearLayers();

  try{

    const keys = [
      "ASCAT",
      "METOP ASCAT",
      "scatterometer wind"
    ];

    let total = 0;

    for(const k of keys){

      const cols = await collections(k);

      for(const c of cols.slice(0,2)){

        const gs = await granules(c.id);

        total += draw(
          gs,
          "#2da8ff",
          windLayer,
          "海上風"
        );
      }
    }

    log("海上風取得完了: " + total + " 点");

  }catch(e){

    log("海上風失敗\n" + e);
  }
}

/* =====================================================
   波高
===================================================== */

async function loadWave(){

  log("波高検索中...");
  waveLayer.clearLayers();

  try{

    const keys = [
      "JASON-3",
      "SENTINEL-6",
      "POSEIDON-4",
      "altimeter wave height"
    ];

    let total = 0;

    for(const k of keys){

      const cols = await collections(k);

      for(const c of cols.slice(0,2)){

        const gs = await granules(c.id);

        total += draw(
          gs,
          "#ff4d4d",
          waveLayer,
          "波高"
        );
      }
    }

    log("波高取得完了: " + total + " 点");

  }catch(e){

    log("波高失敗\n" + e);
  }
}

</script>
</body>
</html>
