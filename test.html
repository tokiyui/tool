<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リアルタイム衛星風ビューア</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
}

#map {
    width: 100%;
    height: 100%;
}

.info {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: rgba(255,255,255,0.9);
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
}

.loading {
    color: #c00;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="info">
    <b>リアルタイム衛星風（AMV）</b><br>
    NOAA風データサンプル<br>
    <span id="status" class="loading">読み込み中...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ========================================
// 地図初期化
// ========================================

const map = L.map('map').setView([20, 140], 4);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);

// ========================================
// Canvasレイヤ
// ========================================

const canvas = L.canvasLayer
    ? L.canvasLayer()
    : null;

// ========================================
// 風描画関数
// ========================================

function drawWind(ctx, x, y, u, v, speed) {

    const scale = 0.8;

    const dx = u * scale;
    const dy = -v * scale;

    // 色
    if (speed >= 50) {
        ctx.strokeStyle = "red";
    } else if (speed >= 30) {
        ctx.strokeStyle = "orange";
    } else {
        ctx.strokeStyle = "cyan";
    }

    ctx.lineWidth = 1;

    // 本体
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + dx, y + dy);
    ctx.stroke();

    // 矢印
    const angle = Math.atan2(dy, dx);
    const arrowSize = 4;

    ctx.beginPath();
    ctx.moveTo(x + dx, y + dy);

    ctx.lineTo(
        x + dx - arrowSize * Math.cos(angle - Math.PI / 6),
        y + dy - arrowSize * Math.sin(angle - Math.PI / 6)
    );

    ctx.lineTo(
        x + dx - arrowSize * Math.cos(angle + Math.PI / 6),
        y + dy - arrowSize * Math.sin(angle + Math.PI / 6)
    );

    ctx.closePath();
    ctx.fillStyle = ctx.strokeStyle;
    ctx.fill();
}

// ========================================
// 疑似リアルタイム衛星風
// （実際のAMVに近い形式）
// ========================================

// NOTE:
// 完全ブラウザのみ + CORS制限回避のため
// ここではリアルタイム取得可能な
// 公開JSONがない場合でも必ず動くように
// 疑似AMV生成を行う
//
// 実運用時は fetch(url) に置換可能
//

function generateAMV() {

    const winds = [];

    for (let lat = -20; lat <= 50; lat += 2) {

        for (let lon = 100; lon <= 180; lon += 2) {

            // 疑似ジェット気流
            const u =
                30 * Math.sin((lat - 25) / 10)
                + 10 * Math.cos(lon / 20);

            const v =
                8 * Math.cos(lat / 10);

            const speed = Math.sqrt(u*u + v*v);

            winds.push({
                lat,
                lon,
                u,
                v,
                speed,
                pressure: 300
            });
        }
    }

    return winds;
}

// ========================================
// 描画
// ========================================

let layer;

function renderWind(data) {

    if (layer) {
        map.removeLayer(layer);
    }

    layer = L.layerGroup();

    data.forEach(w => {

        // 高層のみ
        if (w.pressure > 400) return;

        const latlng = [w.lat, w.lon];

        const marker = L.circleMarker(latlng, {
            radius: 0,
            opacity: 0
        });

        marker.on('add', function() {

            const canvas = this._renderer._container;
            const ctx = canvas.getContext('2d');

            const point = map.latLngToContainerPoint(latlng);

            drawWind(
                ctx,
                point.x,
                point.y,
                w.u,
                w.v,
                w.speed
            );
        });

        layer.addLayer(marker);
    });

    layer.addTo(map);
}

// ========================================
// メイン
// ========================================

async function main() {

    document.getElementById("status").textContent =
        "データ生成中...";

    // ------------------------------------
    // 実データ化する場合:
    //
    // const data = await fetch(URL)
    //      .then(r => r.json());
    // ------------------------------------

    const data = generateAMV();

    renderWind(data);

    document.getElementById("status").textContent =
        `表示中: ${data.length} vectors`;
}

main();

// ========================================
// 地図移動時に再描画
// ========================================

map.on('moveend zoomend', () => {
    main();
});

</script>

</body>
</html>
