<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ASCAT 衛星風ビューア</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

.info {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: rgba(255,255,255,0.9);
    padding: 10px;
    border-radius: 8px;
    font-family: sans-serif;
    font-size: 14px;
}

.loading {
    color: red;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="info">
    <b>ASCAT Scatterometer Wind</b><br>
    <span id="status" class="loading">Loading...</span><br>
    <span id="time"></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =====================================================
// 地図
// =====================================================

const map = L.map('map').setView([25, 140], 4);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

// =====================================================
// Canvas Overlay
// =====================================================

const canvas = document.createElement('canvas');
canvas.style.position = 'absolute';
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.pointerEvents = 'none';

map.getPanes().overlayPane.appendChild(canvas);

const ctx = canvas.getContext('2d');

// =====================================================
// サイズ更新
// =====================================================

function resizeCanvas() {

    const size = map.getSize();

    canvas.width = size.x;
    canvas.height = size.y;
}

resizeCanvas();

map.on('resize', resizeCanvas);

// =====================================================
// 風描画
// =====================================================

function drawWind(lat, lon, speed, dir) {

    const p = map.latLngToContainerPoint([lat, lon]);

    const rad = dir * Math.PI / 180;

    // meteorological direction
    const u = -speed * Math.sin(rad);
    const v = -speed * Math.cos(rad);

    const scale = 2.0;

    const dx = u * scale;
    const dy = -v * scale;

    // color
    if (speed >= 25) {
        ctx.strokeStyle = 'red';
    } else if (speed >= 15) {
        ctx.strokeStyle = 'orange';
    } else {
        ctx.strokeStyle = 'cyan';
    }

    ctx.lineWidth = 1;

    // line
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + dx, p.y + dy);
    ctx.stroke();

    // arrow
    const angle = Math.atan2(dy, dx);
    const a = 4;

    ctx.beginPath();

    ctx.moveTo(p.x + dx, p.y + dy);

    ctx.lineTo(
        p.x + dx - a * Math.cos(angle - Math.PI/6),
        p.y + dy - a * Math.sin(angle - Math.PI/6)
    );

    ctx.lineTo(
        p.x + dx - a * Math.cos(angle + Math.PI/6),
        p.y + dy - a * Math.sin(angle + Math.PI/6)
    );

    ctx.closePath();

    ctx.fillStyle = ctx.strokeStyle;
    ctx.fill();
}

// =====================================================
// ASCAT 疑似リアルタイムデータ
// （実運用では fetch に置換）
// =====================================================

function generateASCAT() {

    const data = [];

    for (let lat = -40; lat <= 50; lat += 1.5) {

        for (let lon = 100; lon <= 180; lon += 1.5) {

            // 海上だけっぽく間引き
            if ((lat + lon) % 5 > 2) continue;

            const speed =
                5
                + 10 * Math.abs(Math.sin(lat / 10))
                + 5 * Math.random();

            const dir =
                90
                + 40 * Math.sin(lon / 20)
                + 20 * Math.cos(lat / 10);

            data.push({
                lat,
                lon,
                speed,
                dir
            });
        }
    }

    return data;
}

// =====================================================
// 描画
// =====================================================

function render(data) {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    data.forEach(w => {

        drawWind(
            w.lat,
            w.lon,
            w.speed,
            w.dir
        );
    });
}

// =====================================================
// 実データ取得例
// =====================================================

// 実際には:
//
// const url = "...json";
//
// const data = await fetch(url).then(r=>r.json());
//
// のように置換可能

// =====================================================
// メイン
// =====================================================

async function main() {

    document.getElementById('status').textContent =
        'Generating ASCAT...';

    const data = generateASCAT();

    render(data);

    const now = new Date();

    document.getElementById('time').textContent =
        now.toISOString();

    document.getElementById('status').textContent =
        `${data.length} vectors`;
}

main();

// =====================================================
// 再描画
// =====================================================

map.on('move zoom', () => {

    main();
});

// =====================================================
// 疑似リアルタイム更新
// =====================================================

setInterval(main, 60000);

</script>

</body>
</html>
