<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCAT Real-time Wind Monitor (CORS Proxy)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #info-panel {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 0 10px rgba(0,0,0,0.2);
            max-width: 300px;
        }
        .legend {
            line-height: 18px; color: #555;
            background: white; padding: 6px 8px; border-radius: 5px;
        }
        .legend i {
            width: 18px; height: 18px; float: left;
            margin-right: 8px; opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <h3>ASCAT NRT Wind</h3>
        <p id="status">プロキシ経由で接続中...</p>
        <div id="meta-info"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 設定 ---
        const LAT_RANGE = "[(30.0):(40.0)]";
        const LON_RANGE = "[(135.0):(145.0)]";
        const DATASET_ID = "noaacwMetopAascatGlobalNrt";
        
        // 元のURL
        const targetUrl = `https://coastwatch.noaa.gov/erddap/griddap/${DATASET_ID}.json?wind_speed[(last)]${LAT_RANGE}${LON_RANGE}`;
        
        // CORS回避用プロキシ
        const proxy = "https://worker.ryohorita105.workers.dev/?url=";
        const FINAL_URL = proxy + encodeURIComponent(targetUrl);

        const map = L.map('map').setView([35.68, 139.76], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function getColor(v) {
            return v > 15 ? '#bd0026' :
                   v > 10 ? '#f03b20' :
                   v > 5  ? '#feb24c' :
                   v > 2  ? '#ffeda0' :
                            '#3288bd';
        }

        async function fetchASCAT() {
            try {
                // プロキシ経由でfetchを実行
                const response = await fetch(FINAL_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const json = await response.json();
                const rows = json.table.rows;
                const statusEl = document.getElementById('status');
                const metaEl = document.getElementById('meta-info');

                if (rows.length === 0) {
                    statusEl.innerText = "指定範囲内に最新データがありません。";
                    return;
                }

                statusEl.innerText = `最新データ取得完了 (${rows.length} 地点)`;
                
                rows.forEach(row => {
                    const [time, lat, lon, speed] = row;
                    if (speed !== null) {
                        L.circleMarker([lat, lon], {
                            radius: 4,
                            fillColor: getColor(speed),
                            color: "#000",
                            weight: 0.5,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).bindPopup(`<b>風速:</b> ${speed.toFixed(2)} m/s<br><b>時刻:</b> ${new Date(time).toLocaleString('ja-JP')}`)
                          .addTo(map);
                    }
                });

                const latestTime = new Date(rows[0][0]).toLocaleString('ja-JP');
                metaEl.innerHTML = `<small>最終更新: ${latestTime}</small>`;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerText = "エラー: データの取得または解析に失敗しました。";
            }
        }

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend');
            const grades = [0, 2, 5, 10, 15];
            div.innerHTML += '<b>Wind (m/s)</b><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                    grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
            }
            return div;
        };
        legend.addTo(map);

        fetchASCAT();
    </script>
</body>
</html>
