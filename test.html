<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ASCAT Real-time Winds</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

.info {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;

    background: rgba(255,255,255,0.95);

    padding: 10px;

    border-radius: 10px;

    font-family: sans-serif;

    width: 320px;
}

#status {
    color: red;
}

</style>
</head>
<body>

<div id="map"></div>

<div class="info">

<b>ASCAT Scatterometer Winds</b><br>

Time:
<input type="datetime-local" id="timeInput">

<button onclick="loadASCAT()">
Load
</button>

<hr>

<div id="status">
Loading...
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =====================================================
// MAP
// =====================================================

const map = L.map('map').setView([20, 140], 4);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

// =====================================================
// CANVAS
// =====================================================

const canvas = document.createElement('canvas');

canvas.style.position = 'absolute';
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.pointerEvents = 'none';

map.getPanes().overlayPane.appendChild(canvas);

const ctx = canvas.getContext('2d');

function resizeCanvas() {

    const size = map.getSize();

    canvas.width = size.x;
    canvas.height = size.y;
}

resizeCanvas();

map.on('resize', resizeCanvas);

// =====================================================
// COLORBAR
// =====================================================

function windColor(speed) {

    if (speed < 5) return '#00ffff';
    if (speed < 10) return '#00ff00';
    if (speed < 15) return '#ffff00';
    if (speed < 20) return '#ff9900';

    return '#ff0000';
}

// =====================================================
// DRAW
// =====================================================

function drawWind(lat, lon, u, v) {

    const speed =
        Math.sqrt(u*u + v*v);

    const p =
        map.latLngToContainerPoint([lat, lon]);

    const scale = 2.0;

    const dx = u * scale;
    const dy = -v * scale;

    const color =
        windColor(speed);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;

    ctx.lineWidth = 1;

    ctx.beginPath();

    ctx.moveTo(p.x, p.y);

    ctx.lineTo(
        p.x + dx,
        p.y + dy
    );

    ctx.stroke();

    const angle =
        Math.atan2(dy, dx);

    const a = 4;

    ctx.beginPath();

    ctx.moveTo(
        p.x + dx,
        p.y + dy
    );

    ctx.lineTo(
        p.x + dx - a * Math.cos(angle - Math.PI/6),
        p.y + dy - a * Math.sin(angle - Math.PI/6)
    );

    ctx.lineTo(
        p.x + dx - a * Math.cos(angle + Math.PI/6),
        p.y + dy - a * Math.sin(angle + Math.PI/6)
    );

    ctx.closePath();

    ctx.fill();
}

// =====================================================
// NOAA ERDDAP
// =====================================================

async function loadASCAT() {

    document.getElementById('status')
        .textContent = 'Loading NOAA ASCAT...';

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    // -----------------------------------------
    // 時刻
    // -----------------------------------------

    let t =
        document.getElementById('timeInput')
        .value;

    if (!t) {

        const now = new Date();

        now.setUTCHours(0,0,0,0);

        t =
            now.toISOString()
            .slice(0,16);
    }

    // ERDDAP time format
    t += ':00Z';

    // -----------------------------------------
    // NOAA ERDDAP URL
    // -----------------------------------------

    const erddapUrl =
`https://erddap.aoml.noaa.gov/hdb/erddap/griddap/ascat_2023.json?x_wind[("${t}")][0][(-60):4:(60)][(80):4:(200)],y_wind[("${t}")][0][(-60):4:(60)][(80):4:(200)]`;

    // -----------------------------------------
    // Cloudflare Worker
    // -----------------------------------------

    const url =
        'https://worker.ryohorita105.workers.dev/?url='
        + encodeURIComponent(erddapUrl);

    console.log(url);

    // -----------------------------------------
    // FETCH
    // -----------------------------------------

    const response =
        await fetch(url);

    const json =
        await response.json();

    console.log(json);

    // =================================================
    // ERDDAP JSON PARSE
    // =================================================

    // table.rows:
    //
    // [time,alt,lat,lon,x_wind]
    //

    const rows =
        json.table.rows;

    let count = 0;

    rows.forEach(r => {

        const lat = r[2];
        const lon = r[3];
        const u = r[4];

        if (!isFinite(u)) return;

        count++;
    });

    // y_wind 取得
    const erddapUrlV =
`https://erddap.aoml.noaa.gov/hdb/erddap/griddap/ascat_2023.json?y_wind[("${t}")][0][(-60):4:(60)][(80):4:(200)]`;

    const urlV =
        'https://worker.ryohorita105.workers.dev/?url='
        + encodeURIComponent(erddapUrlV);

    const responseV =
        await fetch(urlV);

    const jsonV =
        await responseV.json();

    const rowsV =
        jsonV.table.rows;

    // =================================================
    // DRAW
    // =================================================

    for (let i=0; i<rows.length; i++) {

        const rU = rows[i];
        const rV = rowsV[i];

        if (!rU || !rV) continue;

        const lat = rU[2];
        const lon = rU[3];

        const u = rU[4];
        const v = rV[4];

        if (!isFinite(u)) continue;
        if (!isFinite(v)) continue;

        drawWind(
            lat,
            lon,
            u,
            v
        );
    }

    document.getElementById('status')
        .textContent =
            `Loaded ${count} vectors`;
}

// =====================================================
// INIT
// =====================================================

const now = new Date();

now.setUTCHours(0,0,0,0);

document.getElementById('timeInput')
    .value =
        now.toISOString().slice(0,16);

loadASCAT();

// =====================================================
// REDRAW
// =====================================================

map.on('move zoom', loadASCAT);

</script>

</body>
</html>
