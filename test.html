<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>衛星観測 海上風・波高（CORS Proxy完全版）</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
height:100%;
font-family:sans-serif;
}
#map{
width:100%;
height:100%;
}
.panel{
position:absolute;
z-index:1000;
top:10px;
left:10px;
width:470px;
max-height:94%;
overflow:auto;
background:rgba(10,16,28,.95);
color:#fff;
padding:14px;
border-radius:12px;
}
button{
padding:8px 12px;
margin:4px 4px 8px 0;
border:none;
border-radius:8px;
background:#2d8cff;
color:#fff;
cursor:pointer;
}
pre{
white-space:pre-wrap;
word-break:break-word;
background:#08101d;
padding:10px;
border-radius:8px;
font-size:12px;
max-height:280px;
overflow:auto;
}
.small{
font-size:12px;
color:#b8c5d9;
line-height:1.45;
}
</style>
</head>
<body>

<div class="panel">
<h2 style="margin-top:0;">衛星観測 海上風＋波高</h2>

<div class="small">
ブラウザのみ / APIキー不要 / GitHub Pages可<br>
CORS回避済み（Cloudflare Worker使用）<br>
NetCDF4(HDF5) 読込対応<br><br>

海上風：ASCAT scatterometer<br>
波高：Sentinel / Jason altimeter SWH
</div>

<button onclick="loadWind()">海上風取得</button>
<button onclick="loadWave()">波高取得</button>
<button onclick="clearAll()">消去</button>

<pre id="log">待機中...</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import * as h5wasm from "https://esm.sh/h5wasm";

await h5wasm.ready;

/* =====================================================
   CORS Proxy
===================================================== */

const CORS_PROXY =
"https://worker.ryohorita105.workers.dev/?url=";

function prox(url){
return CORS_PROXY + encodeURIComponent(url);
}

/* =====================================================
   地図
===================================================== */

const map = L.map("map").setView([28,140],4);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

const windLayer = L.layerGroup().addTo(map);
const waveLayer = L.layerGroup().addTo(map);

/* =====================================================
   共通
===================================================== */

function log(t){
document.getElementById("log").textContent=t;
}

window.clearAll=function(){
windLayer.clearLayers();
waveLayer.clearLayers();
log("消去しました");
};

async function fetchText(url){
const r = await fetch(prox(url));
if(!r.ok) throw new Error("HTTP "+r.status);
return await r.text();
}

async function fetchBuffer(url){
const r = await fetch(prox(url));
if(!r.ok) throw new Error("HTTP "+r.status);
return await r.arrayBuffer();
}

async function openNc(url){

const buf = await fetchBuffer(url);

h5wasm.FS.writeFile(
"/tmp.nc",
new Uint8Array(buf)
);

return new h5wasm.File("/tmp.nc","r");
}

function readVar(file,names){

for(const n of names){
try{
return file.get(n).value;
}catch(e){}
}

return null;
}

/* =====================================================
   海上風URL（実在公開NetCDF）
===================================================== */

async function latestWindURL(){

/* NOAA STAR ASCAT */
const base =
"https://manati.star.nesdis.noaa.gov/datasets/ASCATBNetCDF/";

const html = await fetchText(base);

const files = [...html.matchAll(
/href="([^"]+\.nc)"/g
)].map(v=>v[1]);

if(!files.length) throw "海上風ncなし";

files.sort();

return base + files[files.length-1];
}

/* =====================================================
   波高URL（実在公開NetCDF）
===================================================== */

async function latestWaveURL(){

/* IFREMER / CMEMS mirror example */
const base =
"https://tds.aviso.altimetry.fr/thredds/catalog/data/" +
"alongtrack/catalog.html";

const html = await fetchText(base);

const files = [...html.matchAll(
/href="([^"]+\.nc)"/g
)].map(v=>v[1]);

if(!files.length) throw "波高ncなし";

files.sort();

return files[files.length-1].startsWith("http")
? files[files.length-1]
: base.replace("catalog.html","") + files[files.length-1];
}

/* =====================================================
   海上風
===================================================== */

window.loadWind = async function(){

windLayer.clearLayers();

try{

log("海上風URL検索中...");

const url = await latestWindURL();

log("取得中...\n"+url);

const file = await openNc(url);

const lat = readVar(file,["lat","latitude"]);
const lon = readVar(file,["lon","longitude"]);
const ws  = readVar(file,[
"wind_speed","windspeed","ws"
]);

if(!lat||!lon||!ws)
throw "変数未検出";

let n=0;

for(let i=0;i<lat.length;i+=20){

if(
lat[i]==null||
lon[i]==null||
ws[i]==null
) continue;

L.circleMarker([lat[i],lon[i]],{
radius:3+ws[i]/8,
color:"#2ea8ff",
fillColor:"#2ea8ff",
fillOpacity:.85,
weight:1
})
.bindPopup(
"海上風<br>"+ws[i].toFixed(1)+" m/s"
)
.addTo(windLayer);

n++;
}

file.close();

log("海上風完了 "+n+"点");

}catch(e){

log("海上風失敗\n"+e);
}
};

/* =====================================================
   波高
===================================================== */

window.loadWave = async function(){

waveLayer.clearLayers();

try{

log("波高URL検索中...");

const url = await latestWaveURL();

log("取得中...\n"+url);

const file = await openNc(url);

const lat = readVar(file,["lat","latitude"]);
const lon = readVar(file,["lon","longitude"]);
const swh = readVar(file,[
"swh",
"significant_wave_height",
"wave_height"
]);

if(!lat||!lon||!swh)
throw "変数未検出";

let n=0;

for(let i=0;i<lat.length;i+=10){

if(
lat[i]==null||
lon[i]==null||
swh[i]==null
) continue;

let c="#00bfff";
if(swh[i]>2)c="#00ff88";
if(swh[i]>4)c="#ffee00";
if(swh[i]>6)c="#ff8800";
if(swh[i]>8)c="#ff0000";

L.circleMarker([lat[i],lon[i]],{
radius:3+swh[i],
color:c,
fillColor:c,
fillOpacity:.85,
weight:1
})
.bindPopup(
"波高<br>"+swh[i].toFixed(1)+" m"
)
.addTo(waveLayer);

n++;
}

file.close();

log("波高完了 "+n+"点");

}catch(e){

log("波高失敗\n"+e);
}
};

</script>
</body>
</html>
